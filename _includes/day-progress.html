<script>
(function() {
  // Day-level position chip: shows "Monday · Lesson 3 of 16" at the top of each lesson.
  // Position is derived from the Quarto sidebar so it stays in sync with _quarto.yml.
  document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname.toLowerCase();
    const match = path.match(/\/(monday|tuesday|wednesday|thursday|capstone)\//);
    if (!match) return;
    const day = match[1];
    const dayLabel = day.charAt(0).toUpperCase() + day.slice(1);

    // Skip the day index page itself
    const isIndex = /\/index\.html?$/.test(path) || path.endsWith('/' + day + '/');
    if (isIndex) return;

    // Collect lesson links from the sidebar for the current day (exclude index and separators)
    const sidebarLinks = Array.from(document.querySelectorAll('.sidebar a[href]'))
      .map(function(a) {
        try { return new URL(a.getAttribute('href'), window.location.href).pathname.toLowerCase(); }
        catch (e) { return null; }
      })
      .filter(function(p) { return p && p.indexOf('/' + day + '/') !== -1; })
      .filter(function(p) { return !/\/index\.html?$/.test(p); });

    // Deduplicate while preserving order
    const seen = new Set();
    const lessons = sidebarLinks.filter(function(p) {
      if (seen.has(p)) return false;
      seen.add(p);
      return true;
    });

    const total = lessons.length;
    if (total === 0) return;

    const currentIdx = lessons.indexOf(path);
    if (currentIdx === -1) return;

    const pct = Math.round(((currentIdx + 1) / total) * 100);
    const title = document.querySelector('h1.title, .quarto-title h1');
    if (!title) return;

    const chip = document.createElement('div');
    chip.className = 'day-progress-chip';
    const noun = day === 'capstone' ? 'Target' : 'Lesson';
    chip.innerHTML =
      '<span>' + dayLabel + '</span>' +
      '<span>· ' + noun + ' ' + (currentIdx + 1) + ' of ' + total + '</span>' +
      '<span class="dpc-bar"><span class="dpc-fill" style="width:' + pct + '%"></span></span>';
    title.insertAdjacentElement('afterend', chip);
  });
})();
</script>
